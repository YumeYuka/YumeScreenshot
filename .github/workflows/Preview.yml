name: Issue Preview

on:
  issues:
    types: [opened, edited, closed, reopened]
  pull_request:
    types: [opened, edited, closed, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue/PR number to generate preview for'
        required: true
        type: number
      ref:
        description: 'Branch or ref to use for relative image paths'
        required: false
        type: string
        default: 'main'

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event_name != 'issues' || github.event.action != 'closed'
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g pnpm && pnpm add puppeteer marked

      - run: npx puppeteer browsers install chrome

      - uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number || github.event.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ inputs.ref || github.ref_name }}
        with:
          script: |
            const puppeteer = require('puppeteer');
            const { marked } = require('marked');
            const fs = require('fs');
            const path = require('path');

            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const repo = process.env.GITHUB_REPOSITORY;
            const branch = process.env.GITHUB_REF_NAME || 'main';

            if (!issueNumber || isNaN(issueNumber)) {
              core.setFailed('Invalid issue number');
              return;
            }

            core.info(`Generating preview for #${issueNumber}`);

            // Fetch issue/PR data
            const [owner, repoName] = repo.split('/');
            let issue, isPR = false;

            try {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo: repoName,
                pull_number: issueNumber
              });
              issue = pr;
              isPR = true;
            } catch (e) {
              const { data: issueData } = await github.rest.issues.get({
                owner,
                repo: repoName,
                issue_number: issueNumber
              });
              issue = issueData;
            }

            const issueTitle = issue.title || 'Untitled';
            const issueBody = issue.body || '';
            const htmlUrl = issue.html_url || `https://github.com/${repo}/issues/${issueNumber}`;

            function resolveImageUrl(src) {
              if (src.startsWith('http://') || src.startsWith('https://') || src.startsWith('data:')) return src;
              if (repo) {
                const cleanPath = src.replace(/^\.?\//, '');
                return `https://raw.githubusercontent.com/${repo}/${branch}/${cleanPath}`;
              }
              return src;
            }

            function processImageUrls(html) {
              html = html.replace(/<img([^>]*)\s+src=(["'])([^"']+)\2([^>]*)>/gi, (_, before, _q, src, after) => {
                return `<img${before} src="${resolveImageUrl(src)}"${after}>`;
              });
              html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => `![${alt}](${resolveImageUrl(url)})`);
              return html;
            }

            function processTaskLists(html) {
              return html.replace(/<li>\s*\[([ xX])\]\s*/g, (_, checked) => {
                const checkbox = checked.toLowerCase() === 'x'
                  ? '<input type="checkbox" checked disabled>'
                  : '<input type="checkbox" disabled>';
                return `<li class="task-list-item">${checkbox} `;
              });
            }

            const githubStyles = `
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <style>
                * { box-sizing: border-box; margin: 0; padding: 0; }
                body {
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
                  font-size: 16px;
                  line-height: 1.5;
                  color: #1F2328;
                  background: #ffffff;
                  padding: 32px 48px;
                }
                .issue-container { max-width: 896px; margin: 0 auto; }
                .issue-header { border-bottom: 1px solid #d1d9e0; padding-bottom: 16px; margin-bottom: 24px; }
                .issue-title { font-size: 32px; font-weight: 600; color: #1F2328; margin-bottom: 8px; line-height: 1.25; }
                .issue-meta { color: #656d76; font-size: 14px; }
                .markdown-body { font-size: 16px; line-height: 1.5; color: #1F2328; }
                .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
                  margin-top: 24px; margin-bottom: 16px; font-weight: 600; line-height: 1.25;
                }
                .markdown-body h1 { font-size: 2em; padding-bottom: .3em; border-bottom: 1px solid #d1d9e0; }
                .markdown-body h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid #d1d9e0; }
                .markdown-body h3 { font-size: 1.25em; }
                .markdown-body p { margin-bottom: 16px; }
                .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 16px; }
                .markdown-body li { margin-top: 4px; list-style-position: outside; }
                .markdown-body ul.contains-task-list { list-style: none; padding-left: 0; }
                .markdown-body .task-list-item { list-style: none; margin-left: -1.5em; }
                .markdown-body .task-list-item input[type="checkbox"] {
                  margin: 0 .5em .25em -1.6em; vertical-align: middle; width: 16px; height: 16px; accent-color: #1f883d;
                }
                .markdown-body blockquote {
                  padding: 0 1em; color: #656d76; border-left: .25em solid #d1d9e0; margin: 0 0 16px 0;
                }
                .markdown-body code {
                  padding: .2em .4em; margin: 0; font-size: 85%;
                  font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
                  background-color: rgba(175,184,193,0.2); border-radius: 6px;
                }
                .markdown-body pre {
                  padding: 16px; overflow: auto; font-size: 85%; line-height: 1.45;
                  font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
                  background-color: #f6f8fa; border-radius: 6px; margin-bottom: 16px;
                }
                .markdown-body pre code { background-color: transparent; padding: 0; font-size: 100%; }
                .markdown-body img { max-width: 100%; height: auto; background-color: #fff; border-radius: 6px; }
                .markdown-body a { color: #0969da; text-decoration: none; }
                .markdown-body a:hover { text-decoration: underline; }
                .markdown-body table {
                  border-spacing: 0; border-collapse: collapse; margin-bottom: 16px;
                  display: block; width: max-content; max-width: 100%; overflow: auto;
                }
                .markdown-body table th, .markdown-body table td { padding: 6px 13px; border: 1px solid #d1d9e0; }
                .markdown-body table th { font-weight: 600; background-color: #f6f8fa; }
                .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa; }
                .markdown-body hr { height: .25em; padding: 0; margin: 24px 0; background-color: #d1d9e0; border: 0; }
                .markdown-body details { margin-bottom: 16px; border: 1px solid #d1d9e0; border-radius: 6px; padding: 16px; }
                .markdown-body details summary { cursor: pointer; font-weight: 600; }
                .markdown-body kbd {
                  display: inline-block; padding: 3px 5px;
                  font: 11px ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
                  line-height: 10px; color: #1F2328; vertical-align: middle;
                  background-color: #f6f8fa; border: 1px solid rgba(175,184,193,0.4); border-radius: 6px;
                  box-shadow: inset 0 -1px 0 rgba(175,184,193,0.4);
                }
                .markdown-body mark { background-color: #fff8c5; padding: .2em .4em; border-radius: 6px; }
                .markdown-body .markdown-alert { padding: 16px; margin-bottom: 16px; border-left: .25em solid; border-radius: 6px; }
                .markdown-body .markdown-alert-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
                .markdown-body .markdown-alert-note { border-color: #0969da; background-color: #ddf4ff; }
                .markdown-body .markdown-alert-tip { border-color: #1a7f37; background-color: #dafbe1; }
                .markdown-body .markdown-alert-important { border-color: #8250df; background-color: #fbefff; }
                .markdown-body .markdown-alert-warning { border-color: #9a6700; background-color: #fff8c5; }
                .markdown-body .markdown-alert-caution { border-color: #cf222e; background-color: #ffebe9; }
              </style>
            </head>
            <body>
              <div class="issue-container">
                <div class="issue-header">
                  <h1 class="issue-title">${issueTitle.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</h1>
                  <div class="issue-meta"><span>#${issueNumber} · ${isPR ? 'Pull Request' : 'Issue'} · ${repo}</span></div>
                </div>
                <div class="markdown-body">{{body}}</div>
              </div>
            </body>
            </html>`;

            marked.setOptions({ gfm: true, breaks: true });

            let processedBody = processImageUrls(issueBody);
            processedBody = processedBody.replace(
              /^>[\s]*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\][\s]*\n/gm,
              (_, type) => `<div class="markdown-alert markdown-alert-${type.toLowerCase()}">\n<div class="markdown-alert-title">${type}</div>\n`
            );

            let renderedBody = marked(processedBody);
            renderedBody = processTaskLists(renderedBody);
            renderedBody = renderedBody.replace(
              /<ul>([^]*?)<li class="task-list-item">/g,
              '<ul class="contains-task-list">$1<li class="task-list-item">'
            );

            const html = githubStyles.replace('{{body}}', renderedBody);

            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            try {
              const page = await browser.newPage();
              await page.setViewport({ width: 1200, height: 800, deviceScaleFactor: 2 });
              await page.setContent(html, { waitUntil: 'networkidle0' });

              await page.evaluate(async () => {
                const images = Array.from(document.images);
                await Promise.all(images.map(img => {
                  if (img.complete) return Promise.resolve();
                  return new Promise(resolve => {
                    img.onload = img.onerror = () => resolve();
                    setTimeout(resolve, 5000);
                  });
                }));
              });

              const outputDir = './screenshots';
              fs.mkdirSync(outputDir, { recursive: true });
              const screenshotPath = path.join(outputDir, `issue-${issueNumber}.png`);

              await page.screenshot({ path: screenshotPath, fullPage: true, type: 'png' });
              core.info(`Screenshot saved: ${screenshotPath}`);
            } finally {
              await browser.close();
            }

      - uses: actions/upload-artifact@v4
        with:
          name: issue-${{ inputs.issue_number || github.event.number }}-preview
          path: ./screenshots/issue-${{ inputs.issue_number || github.event.number }}.png
          retention-days: 30
          if-no-files-found: error
